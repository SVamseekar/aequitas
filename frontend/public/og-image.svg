<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Aequitas — Public Sector Transport Intelligence">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#12121f"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#808080" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <g transform="translate(80, 200)">
    <path d="M4 20L12 4l8 16" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M8 13h8" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="12" cy="4" r="2" fill="#818cf8"/>
    <circle cx="4" cy="20" r="2" fill="#818cf8"/>
    <circle cx="20" cy="20" r="2" fill="#818cf8"/>
  </g>
  <text x="140" y="210" fill="#f2f2f2" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700" letter-spacing="8">AEQUITAS</text>
  <text x="80" y="300" fill="#f2f2f2" font-family="ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="800">See where your bus network</text>
  <text x="80" y="370" fill="#818cf8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="800">is failing people.</text>
  <text x="80" y="440" fill="#8b92a8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24">Evidence-graded transport policy intelligence for UK public sector</text>
  <rect x="80" y="490" width="320" height="4" fill="#818cf8" opacity="0.5"/>
</svg>